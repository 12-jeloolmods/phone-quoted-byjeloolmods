<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>IQC BY FAJAR PROJECT | Blue White Edition</title>
  <style>
    /* === RESET === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0c1a2f 0%, #0f2a3f 30%, #1a3b5c 70%, #0e2a3e 100%);
      color: #eef5ff;
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      text-align: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Dynamic grid pattern with blue tint */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(64, 164, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(64, 164, 255, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
      pointer-events: none;
    }

    /* Glitch container tetap modern */
    .glitch-container {
      position: relative;
      margin-bottom: 20px;
    }

    .logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 3px solid #ffffff;
      box-shadow: 
        0 0 30px rgba(0, 110, 255, 0.5),
        inset 0 0 20px rgba(255, 255, 255, 0.3);
      animation: logoFloat 4s ease-in-out infinite;
      filter: grayscale(20%) contrast(110%) brightness(1.05);
      position: relative;
      z-index: 2;
      transition: all 0.3s;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 2.6rem;
      margin: 10px 0 30px;
      position: relative;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #7ab3ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 10px rgba(0, 110, 255, 0.3);
    }

    /* Efek glitch tetap keren tapi dengan sentuhan biru */
    .glitch {
      position: relative;
      color: white;
    }
    
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .glitch::before {
      left: 2px;
      text-shadow: -2px 0 #0066ff;
      background: transparent;
      animation: glitch-1 2s infinite linear alternate-reverse;
    }
    
    .glitch::after {
      left: -2px;
      text-shadow: 2px 0 #00a6ff;
      background: transparent;
      animation: glitch-2 3s infinite linear alternate-reverse;
    }
    
    @keyframes glitch-1 {
      0% { clip-path: inset(40% 0 61% 0); }
      5% { clip-path: inset(92% 0 1% 0); }
      10% { clip-path: inset(43% 0 1% 0); }
      15% { clip-path: inset(25% 0 58% 0); }
      20% { clip-path: inset(54% 0 7% 0); }
      25% { clip-path: inset(58% 0 43% 0); }
      30% { clip-path: inset(98% 0 1% 0); }
      35% { clip-path: inset(34% 0 67% 0); }
      40% { clip-path: inset(45% 0 24% 0); }
      45% { clip-path: inset(67% 0 19% 0); }
      50% { clip-path: inset(87% 0 2% 0); }
      55% { clip-path: inset(3% 0 89% 0); }
      60% { clip-path: inset(58% 0 34% 0); }
      65% { clip-path: inset(99% 0 1% 0); }
      70% { clip-path: inset(34% 0 65% 0); }
      75% { clip-path: inset(76% 0 6% 0); }
      80% { clip-path: inset(54% 0 36% 0); }
      85% { clip-path: inset(89% 0 4% 0); }
      90% { clip-path: inset(23% 0 66% 0); }
      95% { clip-path: inset(12% 0 85% 0); }
      100% { clip-path: inset(80% 0 19% 0); }
    }
    
    @keyframes glitch-2 {
      0% { clip-path: inset(25% 0 58% 0); }
      5% { clip-path: inset(54% 0 7% 0); }
      10% { clip-path: inset(58% 0 43% 0); }
      15% { clip-path: inset(98% 0 1% 0); }
      20% { clip-path: inset(34% 0 67% 0); }
      25% { clip-path: inset(45% 0 24% 0); }
      30% { clip-path: inset(67% 0 19% 0); }
      35% { clip-path: inset(87% 0 2% 0); }
      40% { clip-path: inset(3% 0 89% 0); }
      45% { clip-path: inset(58% 0 34% 0); }
      50% { clip-path: inset(99% 0 1% 0); }
      55% { clip-path: inset(34% 0 65% 0); }
      60% { clip-path: inset(76% 0 6% 0); }
      65% { clip-path: inset(54% 0 36% 0); }
      70% { clip-path: inset(89% 0 4% 0); }
      75% { clip-path: inset(23% 0 66% 0); }
      80% { clip-path: inset(12% 0 85% 0); }
      85% { clip-path: inset(80% 0 19% 0); }
      90% { clip-path: inset(40% 0 61% 0); }
      95% { clip-path: inset(92% 0 1% 0); }
      100% { clip-path: inset(43% 0 1% 0); }
    }

    /* Container utama: biru gelap transparan dengan border putih kebiruan */
    .container {
      background: rgba(8, 28, 51, 0.85);
      padding: 35px;
      border-radius: 28px;
      box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(64, 164, 255, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      width: 100%;
      max-width: 520px;
      text-align: center;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      animation: fadeIn 0.8s ease forwards;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4a9eff, #ffffff, #4a9eff, transparent);
      animation: shine 4s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .login-container, .app-container {
      display: none;
    }

    /* Input dan select gaya putih / biru muda */
    input, select {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 20px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      outline: none;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      transition: all 0.3s;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }

    input::placeholder, select option {
      color: #cce5ff;
      font-weight: 400;
    }

    input:focus, select:focus {
      border-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.4);
      background: rgba(0, 30, 60, 0.7);
    }

    /* Button style: biru terang dengan gradasi putih */
    button {
      background: linear-gradient(105deg, #0a4c8a, #1e6bb8);
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 16px 30px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 1.1rem;
      color: #ffffff;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      margin-top: 10px;
      box-shadow: 0 4px 12px rgba(0, 80, 150, 0.4);
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0, 100, 200, 0.5);
      border-color: #ffffff;
      background: linear-gradient(105deg, #1e6bb8, #0f58a0);
    }

    /* Result section: putih bersih dengan bayangan biru */
    .result {
      margin-top: 25px;
      min-height: 140px;
      animation: fadeIn 0.6s ease forwards;
      padding: 20px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(8px);
    }

    .result img {
      max-width: 100%;
      border-radius: 20px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      margin-top: 15px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
      transition: transform 0.3s ease, filter 0.3s;
      filter: contrast(105%) brightness(1.02);
    }

    .result img:hover {
      transform: scale(1.02);
      filter: brightness(1.05);
      border-color: white;
    }

    /* Loader warna putih + biru */
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top: 4px solid #5aa9ff;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1.2s linear infinite;
      margin: 25px auto;
      position: relative;
    }

    .loader::after {
      content: '';
      position: absolute;
      top: -6px;
      left: -6px;
      right: -6px;
      bottom: -6px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: rgba(90, 169, 255, 0.6);
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Download button - putih dengan biru */
    .download-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      border-radius: 40px;
      background: linear-gradient(95deg, #0f5faf, #2277cc);
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s;
      box-shadow: 0 6px 14px rgba(0, 50, 100, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      font-size: 0.9rem;
    }

    .download-btn:hover {
      box-shadow: 0 10px 22px rgba(0, 110, 200, 0.6);
      transform: translateY(-3px);
      color: #fff;
      background: linear-gradient(95deg, #2277cc, #2f86dd);
      border-color: white;
    }

    /* Footer biru soft */
    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 0.85rem;
      color: #bbdbff;
      text-align: center;
      opacity: 0.9;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      width: 100%;
      max-width: 500px;
      backdrop-filter: blur(5px);
    }

    footer a {
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      position: relative;
    }

    footer a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: #ffffff;
      transition: width 0.3s;
    }

    footer a:hover::after {
      width: 100%;
    }

    /* Error message biru kemerahan tapi dengan sentuhan elegan */
    .error-message {
      color: #ffa2a2;
      margin-top: 15px;
      font-size: 0.9rem;
      display: none;
      padding: 10px;
      background: rgba(255, 80, 80, 0.12);
      border-radius: 12px;
      border-left: 3px solid #ff8888;
      backdrop-filter: blur(4px);
    }

    /* Login container khusus */
    .login-container h2 {
      margin-bottom: 25px;
      font-size: 1.9rem;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      display: inline-block;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .login-container h2::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 20%;
      width: 60%;
      height: 2px;
      background: linear-gradient(to right, transparent, #7ab3ff, #ffffff, #7ab3ff, transparent);
    }

    /* Fade in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      h1 {
        font-size: 1.9rem;
      }
      
      .container {
        padding: 25px 18px;
      }
      
      .logo {
        width: 110px;
        height: 110px;
      }
      
      button, .download-btn {
        padding: 14px 20px;
        font-size: 1rem;
      }
    }

    /* Ikon pendukung */
    i {
      color: #bbdbff;
    }
    button i {
      color: white;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="glitch-container">
    <img src="https://gangalink.vercel.app/i/fz4txxiz.jpg" alt="FAJAR PROJECT Logo" class="logo">
  </div>
  
  <h1 class="glitch" data-text="🌀 iPhone Quoted - FAJAR PROJECT">🌀 iPhone Quoted - FAJAR PROJECT</h1>
  
  <!-- Login Container -->
  <div class="container login-container" id="loginContainer">
    <h2><i class="fas fa-shield-alt"></i> Login Akses</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()"><i class="fas fa-key"></i> Akses Server</button>
    <div class="error-message" id="loginError">❌ Akses ditolak! Kredensial tidak valid.</div>
  </div>
  
  <!-- App Container -->
  <div class="container app-container" id="appContainer">
    <input type="text" id="message" placeholder="✏️ Ketik teks pesan iPhone">
    <input type="text" id="time" placeholder="⏱️ Jam (HH:MM), default 00:00">
    <input type="number" id="battery" placeholder="🔋 Baterai % (0-100), default 100" min="0" max="100">

    <select id="carrier">
      <option value="INDOSAT OOREDOO">INDOSAT OOREDOO</option>
      <option value="TELKOMSEL">TELKOMSEL</option>
      <option value="IM3">IM3</option>
      <option value="XL AXIATA">XL AXIATA</option>
      <option value="TRI">TRI (3)</option>
      <option value="SMARTFREN">SMARTFREN</option>
    </select>

    <button onclick="generateImage()"><i class="fas fa-magic"></i> Generate Quote</button>

    <div class="result" id="result"></div>
  </div>

  <footer>
    <i class="fas fa-code-branch"></i> Made with precision by <a href="#">FAJAR PROJECT</a> | Blue White Edition • iOS Vibe
  </footer>

  <audio id="backgroundMusic" loop>
    <source src="https://n.uguu.se/UtLOHHvQ.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Initialize UI
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('loginContainer').style.display = 'block';
      document.getElementById('appContainer').style.display = 'none';
    });

    // Fungsi login dengan validasi
    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const loginError = document.getElementById("loginError");

      // Kredensial sama seperti asli (Fajar / Vip)
      if (username === "Fajar" && password === "Vip") {
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        loginError.style.display = 'none';
        
        // Mainkan musik latar (otomatis jika diizinkan browser)
        const music = document.getElementById('backgroundMusic');
        music.volume = 0.35;
        music.play().catch(e => console.log("Autoplay diperlukan interaksi:", e));
        
        const appContainer = document.getElementById('appContainer');
        appContainer.style.animation = 'fadeIn 0.7s ease forwards';
      } else {
        loginError.style.display = 'block';
        loginError.style.animation = 'shake 0.5s';
        setTimeout(() => {
          loginError.style.animation = '';
        }, 500);
      }
    }

    // Fungsi generate gambar dengan endpoint API iphone-quoted
    function generateImage() {
      const message = document.getElementById("message").value.trim();
      let time = document.getElementById("time").value.trim();
      let battery = document.getElementById("battery").value.trim();
      const carrier = document.getElementById("carrier").value;
      const resultDiv = document.getElementById("result");

      // Validasi waktu format HH:MM
      const timeRegex = /^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/;
      if (time && !timeRegex.test(time)) {
        alert("⚠️ Format waktu tidak valid! Gunakan HH:MM (contoh: 14:30)");
        return;
      }
      if (time === "") time = "00:00";

      // Validasi baterai
      let batteryNum = parseInt(battery);
      if (battery === "") batteryNum = 100;
      if (isNaN(batteryNum) || batteryNum < 0 || batteryNum > 100) {
        alert("⚠️ Baterai harus angka antara 0 - 100!");
        return;
      }
      battery = batteryNum.toString();

      if (!message) {
        alert("⚠️ Teks pesan tidak boleh kosong!");
        return;
      }

      // Tampilkan loading
      resultDiv.innerHTML = '<div class="loader"></div><p style="color:#cce5ff"><i class="fas fa-sync-alt fa-spin"></i> Generating masterpiece...</p>';

      // Bangun URL API (mirip dengan sumber asli)
      const apiUrl = `https://brat.siputzx.my.id/iphone-quoted?time=${encodeURIComponent(time)}&messageText=${encodeURIComponent(message)}&carrierName=${encodeURIComponent(carrier)}&batteryPercentage=${encodeURIComponent(battery)}&signalStrength=4&emojiStyle=apple`;

      // Simulasi jeda kecil untuk UX lebih mulus
      setTimeout(() => {
        resultDiv.innerHTML = `
          <p style="font-weight: bold; margin-bottom: 12px;"><i class="fas fa-iphone"></i> iPhone Style Quote</p>
          <img src="${apiUrl}" alt="iPhone Quoted Result" style="max-width:100%; border-radius:20px;">
          <br>
          <a class="download-btn" href="${apiUrl}" download="iphone-quoted-fajar.png">
            <i class="fas fa-download"></i> Simpan Gambar
          </a>
          <p style="font-size:0.75rem; margin-top:12px; opacity:0.8;"><i class="fas fa-shield-alt"></i> Blue White Edition | FAJAR PROJECT</p>
        `;
      }, 1000);
    }
    
    // Tambahkan keyframe shake untuk error
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
        20%, 40%, 60%, 80% { transform: translateX(6px); }
      }
      /* tambahan style hover untuk select */
      select option {
        background: #0a2a44;
        color: white;
      }
      ::-webkit-scrollbar {
        width: 5px;
        background: #0c2b4f;
      }
      ::-webkit-scrollbar-thumb {
        background: #4a9eff;
        border-radius: 10px;
      }
    `;
    document.head.appendChild(styleSheet);
  </script>
</body>
</html>
